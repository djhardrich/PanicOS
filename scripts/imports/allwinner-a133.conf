# A133 — closed-source vendor BSP. Knulli ships pre-built blobs.
ROCKNIX_DEVICE_DIR=""    # ROCKNIX doesn't support A133

# Knulli vendor — blob-only mode
KNULLI_BOARD_DIR="board/batocera/allwinner/a133"
BUILD_MODE="from-blobs"

# Per-device blob lists (relative paths under KNULLI_BOARD_DIR/<device>/)
# The actual blob paths/devices are filled in by sync-knulli.sh based on
# inspection of the device dir; this conf just declares the SoC is blob-mode.

# Manifest section names
MANIFEST_SECTION_ROCKNIX=""   # unused (no ROCKNIX support)
MANIFEST_SECTION_KNULLI="knulli-a133-vendor"
