# RK3566 — Rockchip mainline-via-ROCKNIX, vendor-via-Knulli
ROCKNIX_DEVICE_DIR="projects/ROCKNIX/devices/RK3566"
ROCKNIX_PATCHES_VERSION_DIR="projects/ROCKNIX/packages/linux/patches/7.0"
ROCKNIX_DTS_DIR="$ROCKNIX_DEVICE_DIR/linux/dts/rockchip"
ROCKNIX_KERNEL_CONFIG_FRAGMENT="$ROCKNIX_DEVICE_DIR/linux/linux.aarch64.conf"
ROCKNIX_UBOOT_PATCHES_DIR="$ROCKNIX_DEVICE_DIR/packages/u-boot/patches"
ROCKNIX_CHERRY_PICKS=( )

# No cherry-pick patches for RK3566
ROCKNIX_CP_KERNEL_PATCHES=( )
ROCKNIX_CP_UBOOT_PATCHES=( )
ROCKNIX_SYNTH_DEFCONFIGS=( )

# Firmware blobs to stage into target /usr/lib/firmware/ via rootfs-overlay.
# See allwinner-h700.conf for rationale (kikuchan98 panel-mipi-dpi-spi
# loads init sequences via request_firmware, plus Realtek BT, Cirrus DSP).
ROCKNIX_FIRMWARE_DIRS=(
    "projects/ROCKNIX/packages/linux-firmware/kernel-firmware/extra-firmware"
    "projects/ROCKNIX/packages/linux-firmware/extra-firmware"
)

# Knulli vendor — TheGammaSqueeze 5.10 BSP fork (mainline fragment, per RECON B3)
KNULLI_KERNEL_CONFIG="board/batocera/rockchip/rk3566/linux-defconfig-fragment.config"

BUILD_MODE="from-source"

# Manifest section names
MANIFEST_SECTION_ROCKNIX="rocknix-rk3566-mainline"
MANIFEST_SECTION_KNULLI="knulli-rk3566-vendor"
