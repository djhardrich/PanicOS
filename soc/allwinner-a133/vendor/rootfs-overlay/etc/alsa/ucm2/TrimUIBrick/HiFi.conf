# ALSA UCM2 HiFi use-case for TrimUI Brick
# Allwinner A133 internal codec (allwinner,sunxi-internal-codec)
# Speaker PA enable: PH6 (active-high GPIO, exported via pvrsrvctl / gpio-cdev)
#
# Card name reported by ALSA: "sndcodec" (from vendor DTS device_type)
# Mixer controls are vendor-specific; verify with `amixer -c sndcodec contents`

SectionVerb {
	EnableSequence [
		cdev "hw:sndcodec"

		# Unmute DAC output and route to lineout / headphone
		cset "name='DAC Playback Volume' 63"
		cset "name='Lineout volume' 26"
		cset "name='Headphone volume' 0"

		# Enable output paths (verify control names with amixer on device)
		cset "name='Lineout Switch' on"
	]

	DisableSequence [
		cdev "hw:sndcodec"
		cset "name='Lineout Switch' off"
	]

	SectionDevice."Speaker" {
		Comment "Built-in speaker (PA on PH6)"

		EnableSequence [
			cdev "hw:sndcodec"
			cset "name='Lineout Switch' on"
			# Speaker PA GPIO PH6 is toggled by pvrsrvkm or a dedicated
			# GPIO service — see etc/systemd/system/speaker-pa.service
		]

		DisableSequence [
			cdev "hw:sndcodec"
			cset "name='Lineout Switch' off"
		]

		Value {
			PlaybackPCM "hw:sndcodec,0"
			PlaybackVolume "Lineout volume"
		}
	}

	SectionDevice."Headphones" {
		Comment "3.5mm headphone jack"

		EnableSequence [
			cdev "hw:sndcodec"
			cset "name='Headphone volume' 60"
		]

		DisableSequence [
			cdev "hw:sndcodec"
			cset "name='Headphone volume' 0"
		]

		Value {
			PlaybackPCM "hw:sndcodec,0"
			PlaybackVolume "Headphone volume"
			JackControl "Headphone Jack"
		}
	}
}
