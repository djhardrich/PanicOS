[keyfile]
# Store NM connections in the rootfs overlay upper (/etc/NM/system-connections)
# rather than the ROCKNIX default /storage/.config/NetworkManager/.
#
# NetworkManager.conf sets path=/storage/.config/NetworkManager/system-connections
# (inherited from ROCKNIX). With per-flavor storage overlays that path IS isolated,
# but keeping credentials in the rootfs overlay upper is cleaner (system config
# shouldn't live in user-data storage) and means credentials survive any storage
# migration or re-flash without needing explicit migration.
path=/etc/NetworkManager/system-connections
