[keyfile]
# Store connections in /etc/NetworkManager/system-connections (overlay upper,
# per-flavor) rather than the ROCKNIX default /storage/.config/NetworkManager/.
# This prevents dual-booted ROCKNIX from seeing and conflicting with PanicOS's
# saved WiFi credentials (ROCKNIX iwd uses /storage/.cache/iwd as its state
# dir, so sharing the NM keyfile path causes "can see but can't connect" bugs).
path=/etc/NetworkManager/system-connections
