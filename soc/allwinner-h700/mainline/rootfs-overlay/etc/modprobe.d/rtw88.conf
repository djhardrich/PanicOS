# Disable rtw88 deep link-power-save on H700 (RTL8821CS via SDIO).
# LPS deep mode causes intermittent disassociations under light traffic —
# the radio goes idle, misses a beacon window, and NM tears down the
# connection. disable_lps_deep keeps the radio in shallow LPS only.
options rtw88_core disable_lps_deep=y
