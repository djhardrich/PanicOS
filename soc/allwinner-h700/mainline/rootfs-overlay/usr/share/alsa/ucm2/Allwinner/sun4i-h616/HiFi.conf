# Vendored verbatim from ROCKNIX:
#   third_party/rocknix/projects/ROCKNIX/packages/audio/alsa-ucm-conf/
#   patches/H700/0002_Add-Allwinner-H616-configuration.patch
#
# Author: Ryan Walklin <ryan@testtoast.com>, 2024-12-21
# Subject: sun4i-codec: add routing for headphones and internal speaker
#
# The sun4i-codec kernel driver covers a large number of Allwinner SoCs.
# The H616 codec has a single line-out route, which is used in concert
# with a Toshiba mux chip to send audio to either an internal speaker
# or headphone jack on a number of Anbernic handheld gaming devices.
#
# Without this UCM, the codec boots with `DAC Playback Switch=off` and
# `Speaker Switch=off`, so audio is barely audible (only the bleed
# through the line-out path with the amp disabled).

SectionDevice."Speaker" {
	Comment "Internal Speaker"

	EnableSequence [
		cset "name='DAC Playback Volume' 63"
		cset "name='Speaker Switch' on"
	]

	Value {
		PlaybackMixerElem "Line Out"
		PlaybackPCM "hw:${CardId},0"
	}

	DisableSequence [
		cset "name='Speaker Switch' off"
	]

	ConflictingDevice [
		"Headphones"
	]
}


SectionDevice."Headphones" {
	Comment "Headphones"

	EnableSequence [
		cset "name='DAC Playback Volume' 63"
	]

	Value {
		PlaybackMixerElem "Line Out"
		PlaybackPCM "hw:${CardId},0"
		JackControl "Headphone Jack"
	}

	ConflictingDevice [
		"Speaker"
	]
}
