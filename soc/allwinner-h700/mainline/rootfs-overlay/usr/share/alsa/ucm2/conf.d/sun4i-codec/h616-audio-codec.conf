# Vendored verbatim from ROCKNIX:
#   third_party/rocknix/projects/ROCKNIX/packages/audio/alsa-ucm-conf/
#   patches/H700/0002_Add-Allwinner-H616-configuration.patch
#
# UCM for Allwinner H616 Codec.
#
# The FixedBootSequence runs once when the codec is initialised — it flips
# `DAC Playback Switch` to on. Without this, the codec boots with the DAC
# muted and audio is barely audible; that's the root cause of the "Rockbox
# audio is very quiet" symptom on rg35xx-pro / rg35xx-2024 / rg40xx etc.

Syntax 3

SectionUseCase."HiFi" {
	File "/Allwinner/sun4i-h616/HiFi.conf"
	Comment "Play HiFi quality Music"
}

FixedBootSequence [
	cset "name='DAC Playback Switch' on"
]
