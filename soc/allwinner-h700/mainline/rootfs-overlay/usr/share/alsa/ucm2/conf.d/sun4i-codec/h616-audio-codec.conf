# Derived from ROCKNIX:
#   third_party/rocknix/projects/ROCKNIX/packages/audio/alsa-ucm-conf/
#   patches/H700/0002_Add-Allwinner-H616-configuration.patch
#
# UCM for Allwinner H616 Codec.
#
# FixedBootSequence runs once when the codec is initialised.
#
# DAC Playback Switch: flipped to on so the DAC path is active.
# Without this, the codec boots muted and audio is barely audible.
#
# Line Out Playback Switch: must be on. Without it the DAC path is
# physically gated — the Speaker DAPM widget and PA GPIO (PI5) stay low
# and the speaker is silent until a headphone insertion/removal cycle
# forces a DAPM sync.  ROCKNIX's firmware sets this elsewhere; on
# PanicOS the UCM is the sole initialiser so we must set it here.
#
# Line Out Playback Volume: set to 21/31 (-10.5dB). The hardware reset
# value is 0 (muted); the vendor kernel sets 31 (+1.5dB, max). Raw max
# is too loud — 21 (67%) is the correct attenuation baseline; PipeWire
# software volume sits on top and handles user adjustments via pactl.
#
# DAC Playback Volume: set to 63/63 (100%, max). The DAC amp should always
# be wide open — user-visible volume is controlled by "Line Out Playback
# Volume" via WirePlumber/pactl on top of this.  The EnableSequence in
# HiFi.conf also sets 63, so this ensures max amp level from the moment the
# codec initialises, before WirePlumber activates a UCM device.

Syntax 3

SectionUseCase."HiFi" {
	File "/Allwinner/sun4i-h616/HiFi.conf"
	Comment "Play HiFi quality Music"
}

FixedBootSequence [
	cset "name='DAC Playback Switch' on"
	cset "name='DAC Playback Volume' 63"
	cset "name='Line Out Playback Switch' on"
	cset "name='Line Out Playback Volume' 21"
]
