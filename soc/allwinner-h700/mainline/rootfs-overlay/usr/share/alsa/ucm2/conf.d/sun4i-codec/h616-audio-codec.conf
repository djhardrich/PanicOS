# Derived from ROCKNIX:
#   third_party/rocknix/projects/ROCKNIX/packages/audio/alsa-ucm-conf/
#   patches/H700/0002_Add-Allwinner-H616-configuration.patch
#
# UCM for Allwinner H616 Codec.
#
# FixedBootSequence runs once when the codec is initialised.
#
# DAC Playback Switch: flipped to on so the DAC path is active.
# Without this, the codec boots muted and audio is barely audible.
#
# Line Out Playback Volume: must be set to 31 (hardware max, +1.5dB) or
# audio is nearly silent. The mainline sun4i-codec driver exposes this as
# a separate control (distinct from DAC Playback Volume); the hardware
# reset value is 0 (muted) while the vendor kernel initialises it to 31.
# ROCKNIX's UCM patch omitted this because their firmware sets it via a
# different path, but on PanicOS the UCM is the sole initialiser.

Syntax 3

SectionUseCase."HiFi" {
	File "/Allwinner/sun4i-h616/HiFi.conf"
	Comment "Play HiFi quality Music"
}

FixedBootSequence [
	cset "name='DAC Playback Switch' on"
	cset "name='Line Out Playback Volume' 31"
]
