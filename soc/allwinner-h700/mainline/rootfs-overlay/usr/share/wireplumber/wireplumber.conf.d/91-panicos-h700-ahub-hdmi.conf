# H700 (Allwinner H616) AHUB -> HDMI audio sink.
#
# PipeWire/ACP exposes only off/pro-audio for the bare ahub1_mach I2S DAI card
# (no stereo profile even with valid EDID/ELD — verified on hw 2026-05-30), so no
# HDMI sink is created and audio stays on the speaker. api.alsa.use-acp=false
# makes PipeWire build a raw sink directly from the playback PCM, named
# alsa_output...ahub1_mach...playback.0.0, which hdmi_sense matches (hdmi|ahub1_mach
# regex) and elects as default on HDMI connect.
#
# disable-mmap=true -> RW access. MMAP on the sunxi_v2 AHUB->dw-hdmi dmaengine PCM
# hangs the SoC; RW is stable (verified through repeated open/close on hw).
#
# Format/rate are NOT forced — let PipeWire negotiate. The kernel set_pll
# clk_pllx4 fix (pll-fs=1, audio-hub=24576000, BCLKDIV=8) clocks 48 kHz correctly.
monitor.alsa.rules = [
  {
    matches = [ { device.name = "~alsa_card.*ahub1_mach.*" } ]
    actions = { update-props = { api.alsa.use-acp = false } }
  }
  {
    matches = [ { node.name = "~alsa_output.*ahub.*" } ]
    actions = { update-props = { api.alsa.disable-mmap = true } }
  }
]
