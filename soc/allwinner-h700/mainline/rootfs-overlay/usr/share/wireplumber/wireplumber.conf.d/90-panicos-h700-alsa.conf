# H700 (Allwinner H616) ALSA node tuning.
#
# HDMI audio: the ahub1_mach ALSA device reports whatever the display's EDID
# claims to support (often 96 kHz or higher). Without this rule PipeWire opens
# the node at 96 kHz, all 44.1/48 kHz content gets upsampled, the quantum in
# samples doubles, and switching to HDMI feels sluggish while the clock and
# resampler pipeline stabilize.
#
# Pinning to 48000 Hz means:
#   - 48 kHz content (most game audio) passes through the sink with no SRC
#   - 44.1 kHz content does a single well-optimised 44.1→48 k conversion
#   - The quantum (960 samples @ 48 kHz = 20 ms) stays consistent with the
#     built-in codec, so switching sinks is immediate

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*ahub.*"  }
      { node.name = "~alsa_output.*hdmi.*"  }
    ]
    actions = {
      update-props = {
        audio.rate           = 48000
        api.alsa.period-size = 1024
        api.alsa.headroom    = 256
      }
    }
  }
]
