# H700 (Allwinner H616) ALSA node tuning.
#
# HDMI audio: the ahub1_mach ALSA device advertises RATE [32000, 192000] as a
# continuous range, but the H700's AHUB can only cleanly clock the I2S→dw-hdmi
# path at 48 kHz multiples. Asking for 44100 Hz causes the driver to open at
# 32000 Hz (the range minimum), making all audio play ~28% too slow.
#
# Hard-pin to 48000 Hz: PipeWire's SRC for 44.1→48 k is transparent and
# adds negligible latency. This keeps the quantum consistent with the built-in
# H616 codec node and prevents the 96 kHz default that the EDID would otherwise
# cause (doubled quantum, sluggish HDMI switching).

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*ahub.*"  }
      { node.name = "~alsa_output.*hdmi.*"  }
    ]
    actions = {
      update-props = {
        audio.rate           = 48000
        api.alsa.period-size = 1024
        api.alsa.headroom    = 256
      }
    }
  }
]
