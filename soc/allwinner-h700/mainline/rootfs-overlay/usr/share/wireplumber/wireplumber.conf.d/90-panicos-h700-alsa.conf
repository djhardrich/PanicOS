# H700 (Allwinner H616) ALSA node tuning.
#
# HDMI audio: the ahub1_mach ALSA device reports RATE [32000, 192000] (a
# continuous range) so PipeWire would open it at whatever the graph's default
# rate is — often 96 kHz inherited from the EDID, causing all 44.1/48 kHz
# content to be upsampled and making HDMI switching feel sluggish.
#
# audio.allowed-rates tells PipeWire which rates to actually use and lets it
# switch the ALSA device rate dynamically to match the content:
#   - 44.1 kHz streams → hardware runs at 44100, zero SRC
#   - 48 kHz streams   → hardware runs at 48000, zero SRC
#   - Other rates get converted to whichever allowed rate is closest
#
# audio.rate = 48000 is the idle/startup default (used when no streams are
# connected), keeping the quantum consistent with the built-in H616 codec.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*ahub.*"  }
      { node.name = "~alsa_output.*hdmi.*"  }
    ]
    actions = {
      update-props = {
        audio.allowed-rates  = [ 44100 48000 ]
        audio.rate           = 48000
        api.alsa.period-size = 1024
        api.alsa.headroom    = 256
      }
    }
  }
]
