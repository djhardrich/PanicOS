# panicos-kiosk.conf — sway config for kiosk-style PanicOS flavors.
#
# Minimal: no decorations, no idle, no titlebars, no mouse cursor. The
# foreground app (EmulationStation in the launcher flavor) launches as
# a separate systemd unit that connects to sway's Wayland socket.

# Hide the mouse cursor after 1s of inactivity. Handhelds don't have a
# mouse pointer to begin with — without this sway draws a default cursor
# in the corner.
seat * hide_cursor 1000

# No window decorations. Foreground app fills the panel.
default_border none
default_floating_border none
titlebar_padding 0 0
font pango:DejaVu Sans 1
gaps inner 0
gaps outer 0

# Don't blank/lock the screen — handhelds power off on their own.
exec swaymsg 'output * power on'

# Pull in any drop-ins the user may have placed under
# /storage/.config/sway/conf.d/ for runtime customization.
include /storage/.config/sway/conf.d/*.conf
