# panicos-kiosk.conf — sway config for kiosk-style PanicOS flavors.
#
# Minimal: no decorations, no idle, no titlebars, no mouse cursor. The
# foreground app (EmulationStation in the launcher flavor) launches as
# a separate systemd unit that connects to sway's Wayland socket.

# Hide the mouse cursor after 1s of inactivity. Handhelds don't have a
# mouse pointer to begin with — without this sway draws a default cursor
# in the corner.
seat * hide_cursor 1000

# No window decorations. Foreground app fills the panel.
default_border none
default_floating_border none
gaps inner 0
gaps outer 0

# Black background, tearing allowed (matches ROCKNIX kiosk profile — ES
# redraws at vsync anyway, and allow_tearing avoids compositor latency).
output * bg #000000 solid_color
output * allow_tearing yes
output * max_render_time off

# Don't blank/lock the screen — handhelds power off on their own.
exec swaymsg 'output * power on'

# Hardware volume buttons (RG35XX Pro vol+/vol- map to KEY_VOLUMEUP /
# KEY_VOLUMEDOWN, which Wayland surfaces as XF86AudioRaiseVolume etc).
# Bind at sway level so the keys work universally — ES, pugwash, every
# port — without each client having to handle them. Use wpctl
# (wireplumber's CLI, present whenever pipewire is) since we don't
# ship pactl in the launcher flavor.
bindsym XF86AudioRaiseVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.5
bindsym XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym XF86AudioMute        exec wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle

# Fullscreen all new windows automatically. Native Wayland ports (SDL2
# direct, no westonwrap) create Wayland surfaces as sway clients; without
# this rule they appear as floating windows and the user sees the black
# sway background instead of the game. pm_platform_helper's targeted
# sway_fullscreen call is a belt-and-suspenders fallback for cases where
# the app_id doesn't match the binary basename.
for_window [app_id=".*"] fullscreen enable
for_window [class=".*"] fullscreen enable

# Pull in any drop-ins the user may have placed under
# /storage/.config/sway/conf.d/ for runtime customization.
include /storage/.config/sway/conf.d/*.conf
