# PanicOS launcher-flavor system settings store. Read/written by
# wifictl, rocknix-bluetooth, and ES menus via the get_setting/
# set_setting bash helpers in /etc/profile.d/001-panicos-functions.
#
# 001-functions seeds this file at /storage/.config/system/configs/
# system.cfg from /usr/config/system/configs/system.cfg on first boot
# if it doesn't already exist (so persistent edits survive reflashes
# of the rootfs squashfs).

# Network identity.
system.hostname=panicos

# Wifi (managed by wifictl, backend = iwd).
wifi.enabled=0
wifi.ssid=
wifi.key=
wifi.country=US
wifi.adhoc.enabled=0
wifi.adhoc.id=
wifi.adhoc.channel=6

# Bluetooth (managed by rocknix-bluetooth, backend = bluez).
controllers.bluetooth.enabled=0

# Display (brightness script reads/writes display.brightness as a %).
# Without a default here, get_setting returns empty and bash arithmetic
# treats it as 0 — both stepUp and stepDown clamp to 5% on first press.
display.brightness=80

# Network services (toggled via ES Network Settings menu).
samba.enabled=0
simplehttp.enabled=0
