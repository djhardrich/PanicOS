<?xml version="1.0"?>
<!--
  Minimal ES systems config for the launcher flavor. Two systems only:

    tools  — /usr/share/panicos-launcher/tools/, where Install.PortMaster.sh
             and any other user-facing utilities live (we ship them in
             the rootfs squashfs so they're always available without
             needing to seed /storage on first boot).

    ports  — /storage/roms/ports/, the standard handheld convention.
             PortMaster's Install.PortMaster.sh populates this on
             demand; before that runs, the system shows up in ES with
             zero entries — which is the right signal to the user that
             they need to install PortMaster from Tools first.

  No "emulator" systems on purpose — this flavor is the launcher /
  networking distro, not a complete retro setup. Users wanting standalone
  emulators or RetroArch should use a different flavor or layer them
  on top via overlay.
-->
<systemList>
    <system>
        <name>tools</name>
        <fullname>Tools</fullname>
        <path>/usr/share/panicos-launcher/tools</path>
        <extension>.sh .SH</extension>
        <command>%ROM%</command>
        <platform>tools</platform>
        <theme>tools</theme>
    </system>
    <system>
        <name>ports</name>
        <fullname>Ports</fullname>
        <path>/storage/roms/ports</path>
        <extension>.sh .SH</extension>
        <command>%ROM%</command>
        <platform>ports</platform>
        <theme>ports</theme>
    </system>
</systemList>
