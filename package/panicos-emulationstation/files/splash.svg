<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  PanicOS ES splash. Replaces the batocera "B" logo Anthony Caccese's
  art-book-next theme falls back to via splash.xml's :/splash.svg
  reference. Simple text-on-black so it scales cleanly to any handheld
  panel size without bitmap artifacts.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768">
  <rect width="1024" height="768" fill="#0a0a0f"/>
  <text x="512" y="408" text-anchor="middle"
        font-family="DejaVu Sans, sans-serif" font-size="140" font-weight="bold"
        fill="#f5f5f5" letter-spacing="-2">
    PanicOS
  </text>
</svg>
