# /storage skeleton — created at boot by systemd-tmpfiles.
#
# ROCKNIX uses /storage as the persistent user-data root. Hundreds of
# vendored scripts read/write paths under it (settings cache, profile.d
# fragments written by quirks, autostart user dir, .config for various
# apps). On ROCKNIX the layout is set up by their busybox/scripts/init
# at first boot before systemd starts; on PanicOS we run stock systemd
# init, so we use tmpfiles.d to ensure these paths exist with the right
# permissions on every boot.
#
# Format: type path mode user group age argument
#  d = dir, owned by root with given mode (created if missing)

# Top-level
d /storage                                       0755 root root - -
d /storage/bin                                   0755 root root - -

# .config tree — generated config from quirks + per-app prefs
d /storage/.config                               0755 root root - -
d /storage/.config/profile.d                     0755 root root - -
d /storage/.config/system                        0755 root root - -
d /storage/.config/system/configs                0755 root root - -
d /storage/.config/autostart                     0755 root root - -

# .cache tree
d /storage/.cache                                0755 root root - -
d /storage/.cache/bluetooth                      0755 root root - -
d /storage/.cache/connman                        0755 root root - -
d /storage/.cache/iwd                            0755 root root - -
d /storage/.cache/shadow                         0755 root root - -
