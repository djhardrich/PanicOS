# PanicOS smb.conf
# Public read/write share of /storage — no password required.
# Managed by panicos-samba; regenerate only on firmware updates.

[global]
  server string = PanicOS
  workgroup = WORKGROUP
  unix extensions = no
  browseable = yes
  writeable = yes
  printable = no
  deadtime = 30
  mangled names = no
  name resolve order = host bcast
  printcap name = /dev/null
  load printers = no
  enable core files = no
  map to guest = Bad User
  guest account = root
  security = user
  passdb backend = smbpasswd
  smb encrypt = disabled
  strict allocate = no

  # Runtime paths — all writable at runtime
  pid directory = /run/samba
  lock directory = /run/samba
  state directory = /var/lib/samba
  cache directory = /var/cache/samba
  log file = /var/log/samba.log
  max log size = 100

  # Performance
  socket options = TCP_NODELAY IPTOS_LOWDELAY
  min receivefile size = 16384
  aio read size = 16384
  aio write size = 16384
  use sendfile = yes

[storage]
  comment = PanicOS Storage
  path = /storage
  available = yes
  browseable = yes
  public = yes
  writeable = yes
  follow symlinks = yes
  wide links = yes
