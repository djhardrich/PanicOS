# PanicOS: override wpa_supplicant@<iface>.service to read its config from
# /run/wpa_supplicant.conf (where panicos-wifi-config.service rendered it
# from the boot vfat) instead of the upstream default
# /etc/wpa_supplicant/wpa_supplicant-<iface>.conf. We keep our config on
# tmpfs deliberately — every boot regenerates it from /boot, so a Notepad
# edit on the user's PC takes effect on next reboot with no overlay state.
[Service]
ExecStart=
ExecStart=/sbin/wpa_supplicant -c/run/wpa_supplicant.conf -Dnl80211,wext -i%I
