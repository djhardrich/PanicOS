# IP/DHCP is handled by NetworkManager; iwd only does 802.11 + WPA.
[General]
EnableNetworkConfiguration=false
ControlPortOverNL80211=false

[Network]
RoutePriorityOffset=200
NameResolvingService=systemd
EnableIPv6=true

[Scan]
# iwd default is 300s; we had 30s which caused a background scan every
# 30s — enough to briefly disrupt association on some drivers/APs.
MaximumPeriodicScanInterval=300

[Roam]
# Disable AP roaming. On a handheld that stays near one router, iwd's
# roaming heuristics can trigger a re-association to a "better" BSSID
# on the same SSID, causing a visible disconnect during the transition.
Enabled=false
