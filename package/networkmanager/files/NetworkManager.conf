# ROCKNIX: NetworkManager owns Ethernet and Wi-Fi; Wi-Fi uses iwd as backend.

[main]
auth-polkit=false
plugins=keyfile
dhcp=internal
dns=systemd-resolved
# Disable internet-reachability probing. NM's connectivity checker pings an
# external URL every 20s; a momentary DNS/ISP hiccup marks the connection
# LIMITED and amionline/ES shows "not connected" even while still associated.
# With interval=0 NM reports connected as long as iwd is associated.
connectivity.interval=0

[device]
wifi.backend=iwd

[connection]
# Disable NM-level WiFi power saving. The rtl8723ds/rtw88 driver on H700
# is prone to disconnects under the default power-save policy; explicit
# disable keeps the radio associated at the cost of negligible extra draw.
wifi.powersave=2

[keyfile]
path=/storage/.config/NetworkManager/system-connections
# ROCKNIX USB gadget not DHCP to a router.
unmanaged-devices=interface-name:gadget;interface-name:usb0;interface-name:usbnet;interface-name:rndis0
