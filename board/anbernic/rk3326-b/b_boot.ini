# RK3326-b boot script (b-variant devices: RGB10X, XU-Mini-M, EEClone).
# Compiled to boot.scr by post-image.sh via mkimage -T script.
# This script runs in U-Boot context to select the correct DTB via ADC.

# distro_storagepart = distro_bootpart + 1
if   test ${distro_bootpart} = '0'; then setenv distro_storagepart 1
elif test ${distro_bootpart} = '1'; then setenv distro_storagepart 2
elif test ${distro_bootpart} = '2'; then setenv distro_storagepart 3
elif test ${distro_bootpart} = '3'; then setenv distro_storagepart 4
else                                     setenv distro_storagepart 2
fi

setenv thispart "${devtype} ${devnum}:${distro_bootpart}"

if fsuuid ${thispart} partition_boot; then
  setenv partition_boot "UUID=${partition_boot}"
else
  setenv partition_boot "LABEL=PANICOS"
fi

# Read ADC value from mainline U-Boot env (hwid_adc is set by the board code)
if test -n "${hwid_adc}"; then
  setenv adc ${hwid_adc}
  echo "ADC ${hwid_adc}"
else
  setenv adc 65000
fi

setenv hwid_adc "b,${adc}"

# b-variant ADC ranges (from ROCKNIX b_boot.ini)
if   itest.w ${adc} > 139 && itest.w ${adc} < 191; then
  setenv fdtfile "rk3326-powkiddy-rgb10x.dtb"
elif itest.w ${adc} > 999 && itest.w ${adc} < 1051; then
  setenv fdtfile "rk3326-magicx-xu-mini-m.dtb"
elif itest.w ${adc} > 489 && itest.w ${adc} < 541; then
  setenv fdtfile "rk3326-gameconsole-eeclone.dtb"
else
  echo "Unexpected ADC value ${adc}, falling back to OGA dtb"
  setenv fdtfile "rk3326-odroid-go2.dtb"
fi

setenv kernel_addr_r "0x09000000"
setenv fdtoverlay_addr_r "0x08000000"
sysboot ${thispart} any 0x100000 /extlinux/extlinux.conf
