# PanicOS active image selector.
#
# IMAGE — which .squashfs the initramfs loops + mounts on next boot.
# Must exist on the boot vfat partition next to this file. Drop new
# .squashfs files alongside, then edit IMAGE= to switch.
#
# FLAVOR (optional) — overlay namespace name. Defaults to IMAGE
# without the .squashfs extension. Each unique FLAVOR gets its own
# /storage/.panicos-overlay/<FLAVOR>/{upper,work}, so different rootfs
# variants don't mix /etc, package state, etc.

IMAGE=panicos-rk3326-a-minimal.squashfs
# FLAVOR=
