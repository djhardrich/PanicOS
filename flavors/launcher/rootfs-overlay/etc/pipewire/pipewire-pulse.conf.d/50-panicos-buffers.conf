# Raise PulseAudio-compat minimum buffer floors for H700 (ARM Cortex-A53).
# Default 128/48000 = 2.7ms — too small for weak ARM cores under emulator load;
# causes frequent XRUNs that appear as audio dropouts or silence bursts.
# 960/48000 = 20ms matches ROCKNIX's SM6115 patch (similar ARM class CPU).
pulse.properties = {
    pulse.min.req     = 960/48000
    pulse.min.frag    = 960/48000
    pulse.min.quantum = 960/48000
}
