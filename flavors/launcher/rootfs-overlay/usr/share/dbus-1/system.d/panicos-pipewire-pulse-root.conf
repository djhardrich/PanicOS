<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Allow root to claim the org.pulseaudio.Server bus name on the system
  bus. The buildroot pulseaudio package ships
  /usr/share/dbus-1/system.d/pulseaudio-system.conf which restricts
  ownership to user="pulse" — but on PanicOS pipewire-pulse runs as
  root (vendored from ROCKNIX's audio/pipewire/system.d/pipewire-pulse.service
  which sets User=root). Without this override, pipewire-pulse logs:
      mod.protocol-pulse: Failed to acquire org.pulseaudio.Server:
      org.freedesktop.DBus.Error.AccessDenied
  on every start, and Pulse-protocol clients that look up the daemon
  via D-Bus discovery (instead of the socket) can't find it.

  This file is purely additive: pulseaudio-system.conf still allows the
  pulse user, this just also allows root.
-->
<busconfig>
  <policy user="root">
    <allow own="org.pulseaudio.Server"/>
  </policy>
</busconfig>
