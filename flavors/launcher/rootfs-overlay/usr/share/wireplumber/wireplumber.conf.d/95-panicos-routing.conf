# Bump USB audio sink priority so WirePlumber elects it as the default
# the moment it appears. Built-in codec nodes get priority.session ~1000
# by default; 2000 puts USB-C audio ahead unconditionally.
# With SDL_AUDIODRIVER=pulseaudio, streams are PipeWire streams managed
# by WirePlumber — when the default sink changes, WirePlumber's
# policy.follow-default-target moves existing streams to the new sink.
# Mirrors ROCKNIX's 89-bluez-auto-connect.conf pattern for Bluetooth.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output\\.usb-.*" }
      { node.name = "~alsa_output\\.usb_.*" }
    ]
    actions = {
      update-props = {
        priority.driver  = 2000
        priority.session = 2000
      }
    }
  }
]
