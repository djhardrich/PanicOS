# PanicOS sink-routing policy.
#
# Three issues this addresses (observed on rb34/35 with USB-C audio):
#   1. Plugging USB-C headphones mid-session: the new sink shows up but
#      WirePlumber doesn't make it the default. New streams (Crispy Doom
#      after the LOVE2D selector) keep going to the speakers.
#   2. Some apps (Rockbox) never use USB-C even after default change —
#      they pin to the codec sink at start.
#   3. PortMaster ports launched through bash chains lose the "follow
#      default" hint because the stream is created with explicit target.
#
# Equivalent of PulseAudio's `module-switch-on-connect` plus a small
# priority bump for USB audio so it wins the default-target election
# the moment it appears. linking.follow-default-target=true (already
# the WP default) then carries existing streams across the switch.

monitor.alsa.rules = [
  # Bump priority of USB output sinks so they outrank the on-board
  # codec sink the moment they show up. WirePlumber's default-target
  # picker uses priority.session as the tiebreaker. Default codec
  # priority is typically ~1000; 2000 puts USB ahead unconditionally.
  {
    matches = [
      { node.name = "~alsa_output\\.usb-.*" }
      { node.name = "~alsa_output\\.usb_.*" }
    ]
    actions = {
      update-props = {
        priority.driver  = 2000
        priority.session = 2000
      }
    }
  }
]

# Force re-evaluation of default targets when devices appear/disappear.
# Without restore-default-targets=false, WP remembers the previous
# default and sticks with it even when a higher-priority device shows
# up — that's why USB-C plug-in didn't migrate the active stream.
wireplumber.settings = {
  device.restore-default-targets = false
}

# Apply media-role-style "Movie" / "Music" routing for streams that
# don't pin themselves explicitly: prefer the highest-priority sink.
# (Already the WP default behavior; making it explicit so it survives
# any future config drift.)
wireplumber.profiles = {
  main = {
    policy.role-priority-system = required
  }
}
