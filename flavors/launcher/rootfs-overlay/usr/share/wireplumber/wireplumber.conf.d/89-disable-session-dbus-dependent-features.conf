# Vendored verbatim from ROCKNIX's audio/wireplumber/package.mk.
#
# WirePlumber's "main" profile requires several features that depend on a
# session D-Bus to function. We run system-mode wireplumber (no session
# bus), so these features fail to load and — critically — when
# `monitor.alsa.reserve-device` fails to load, the entire `monitor.alsa`
# script silently disables itself, enumerating ZERO ALSA cards. Result:
# `wpctl status` shows empty Sinks/Sources, all audio clients write
# into a daemon with no sinks, audio is silently dropped.
#
# Disabling these features explicitly tells wireplumber to skip them
# rather than treating them as required, which lets monitor.alsa run
# without reserve-device.
wireplumber.profiles = {
  main = {
    monitor.alsa.reserve-device = disabled
    monitor.bluez.seat-monitoring = disabled
    support.portal-permissionstore = disabled
  }
}
