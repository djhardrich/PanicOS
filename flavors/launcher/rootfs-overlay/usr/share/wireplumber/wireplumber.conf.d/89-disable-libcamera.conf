# Vendored verbatim from ROCKNIX. We don't ship libspa-libcamera, so the
# libcamera monitor logs noisy errors at boot ("SPA handle
# 'api.libcamera.enum.manager' could not be loaded; is it installed?").
# Disable cleanly to suppress.
wireplumber.profiles = {
  main = {
    monitor.libcamera = disabled
  }
}
