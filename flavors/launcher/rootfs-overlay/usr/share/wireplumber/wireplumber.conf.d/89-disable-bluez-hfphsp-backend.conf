# Vendored verbatim from ROCKNIX. Disable bluetooth HFP/HSP (handsfree /
# headset profile) backend. We aren't shipping ofono / hsphfpd /
# native-bluez backends, so HFP/HSP profiles can't initialise; setting
# the backend to "none" prevents wireplumber from trying.
monitor.bluez.properties = {
  bluez5.hfphsp-backend = "none"
}
