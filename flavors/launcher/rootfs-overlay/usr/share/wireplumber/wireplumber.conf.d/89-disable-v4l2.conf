# Vendored verbatim from ROCKNIX. We don't ship libspa-v4l2, so the
# v4l2 monitor logs noisy errors at boot ("SPA handle 'api.v4l2.enum.udev'
# could not be loaded; is it installed?"). Disabling cleanly suppresses
# the warnings without breaking anything.
wireplumber.profiles = {
  main = {
    monitor.v4l2 = disabled
  }
}
