# WirePlumber ALSA node rules for H700 (Allwinner H616 sun4i-codec).
#
# Forces S16LE format + 1024-sample periods on the internal platform codec.
# Matches only platform- (SoC-integrated) nodes; USB audio nodes are
# excluded so they negotiate their own format/period with WirePlumber.
# Mirrors ROCKNIX's SM6115 device rule (90-sm6115-s16le.conf).
#
# Why S16LE: emulators and most media apps output S16LE natively; keeping
# the ALSA hardware node in S16LE avoids a needless F32↔S16 conversion
# step in PipeWire's graph.  PipeWire's internal graph still uses F32
# (the convert node handles S16LE→F32 on the way in and F32→S16LE on the
# way to the hardware sink).
#
# Why 1024-sample period: 1024/48000 ≈ 21ms, large enough to absorb
# scheduler jitter on ARM A53.  headroom = 512 leaves a full period of
# safety margin before the hardware ring-buffer wraps.  Together these
# eliminate the XRUNs that manifest as audio dropouts under emulator load.
monitor.alsa.rules = [
  {
    matches = [ { node.name = "~alsa_output\\.platform-.*" } ]
    actions = {
      update-props = {
        audio.format          = "S16LE"
        api.alsa.period-size  = 1024
        api.alsa.headroom     = 512
      }
    }
  }
]
