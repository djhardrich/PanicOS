# Bluetooth audio policy rules.
#
# When a BT device pairs/connects, auto-connect the A2DP sink profile and
# enable hardware volume control on it.  HFP/HSP are intentionally excluded —
# 89-disable-bluez-hfphsp-backend.conf sets the backend to "none" since we
# don't ship ofono/hsphfpd.
#
# Priority 2000 (same as our USB audio boost in 95-panicos-routing.conf)
# ensures any connected BT output becomes the default sink over the built-in
# H700 codec (which sits at the default priority of 1000).

monitor.bluez.rules = [
  {
    matches = [ { device.name = "~bluez_card.*" } ]
    actions = {
      update-props = {
        bluez5.auto-connect  = [ a2dp_sink ]
        bluez5.hw-volume     = [ a2dp_sink ]
      }
    }
  },
  {
    matches = [ { node.name = "~bluez_output.*" } ]
    actions = {
      update-props = {
        priority.driver  = 2000
        priority.session = 2000
      }
    }
  }
]
