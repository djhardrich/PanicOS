# PanicOS LightDM GTK greeter config — surfaces onboard as on-screen
# keyboard so username/password entry works without a physical keyboard.
#
# onboard is X11-native and supports --xid embed mode. lightdm-gtk-greeter
# uses XEMBED to host it as a child of the greeter window — it appears as
# soon as an entry field has focus.

[greeter]
keyboard=onboard --xid
keyboard-position=50%,end
# 640x480 native panel — keep theme readable
font-name=Sans 10
default-user-image=#avatar-default
indicators=~spacer;~clock;~spacer;~session;~power
