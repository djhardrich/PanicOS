[core]
plugins = required autostart move resize animate vswitch decoration \
          place export-shm shortcuts-inhibit command

# Single workspace (small screen — no point in multiple)
vwidth  = 1
vheight = 1

[input]
xkb_layout = us
natural_scroll = false
# Cursor theme
cursor_theme = default
cursor_size  = 24

[output:DSI-1]
# Force 640×480 — adjust if device reports differently
mode = 640x480@60000

[decoration]
border_size   = 2
active_color  = 0.2 0.4 0.8 1.0
inactive_color = 0.3 0.3 0.3 1.0
title_height  = 22
font          = Sans Bold 10
button_order  = minimize maximize close

[animate]
open_animation  = zoom
close_animation = zoom
duration        = 200

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[vswitch]
binding_left  = <super> KEY_LEFT
binding_right = <super> KEY_RIGHT

[autostart]
# Wallpaper
background  = swaybg -c "#1a1a2e" -m solid_color

# System tray / panel
panel = waybar

# NetworkManager applet
nm_applet = nm-applet --indicator

# Notification daemon
notifications = mako

[place]
mode = cascade

[command]
# Volume
binding_vol_up   = KEY_VOLUMEUP
command_vol_up   = wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binding_vol_down = KEY_VOLUMEDOWN
command_vol_down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Brightness
binding_br_up    = KEY_BRIGHTNESSUP
command_br_up    = brightnessctl set +10%
binding_br_down  = KEY_BRIGHTNESSDOWN
command_br_down  = brightnessctl set 10%-

# Power button → suspend (not instant poweroff)
binding_power    = KEY_POWER
command_power    = systemctl suspend

# Menu button → toggle OSK: kill if running, start if not
binding_menu     = KEY_MENU
command_menu     = pkill -x wvkbd-mobintl || wvkbd-mobintl -L 160 &

# App launcher — categorized app grid with icons
binding_launcher = <super> KEY_SPACE
command_launcher = rofi -show drun -show-icons
