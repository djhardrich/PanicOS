[core]
# Plugins: tiling, animations, workspace switching, window decorations
plugins = required autostart move resize animate vswitch decoration \
          place export-shm shortcuts-inhibit

# Single workspace (small screen — no point in multiple)
vwidth  = 1
vheight = 1

[input]
xkb_layout = us
natural_scroll = false
# Cursor theme
cursor_theme = default
cursor_size  = 24

[output:DSI-1]
# Force 640×480 — adjust if device reports differently
mode = 640x480@60000

[decoration]
border_size   = 2
active_color  = 0.2 0.4 0.8 1.0
inactive_color = 0.3 0.3 0.3 1.0
title_height  = 22
font          = Sans Bold 10
button_order  = minimize maximize close

[animate]
open_animation  = zoom
close_animation = zoom
duration        = 200

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[vswitch]
binding_left  = <super> KEY_LEFT
binding_right = <super> KEY_RIGHT

[autostart]
# Wallpaper
background  = swaybg -c "#1a1a2e" -m solid_color

# System tray / panel
panel = waybar

# NetworkManager applet
nm_applet = nm-applet --indicator

# Gamepad mouse daemon (also managed by systemd, this is a fallback)
# gamepad_mouse = /usr/local/lib/panicos/gamepad-mouse.py

# Notification daemon
notifications = mako

[place]
mode = cascade
