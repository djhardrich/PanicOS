# PanicOS default kanshi profiles. kanshi listens for output hotplug and
# applies the profile that matches the longest list of currently-connected
# outputs. Profile names are kept simple (no dashes) to satisfy parsers in
# older kanshi versions (Debian sid ships 1.6+ but be conservative).
#
# internal: just the built-in 640x480 panel (DSI-1).
# docked:   internal panel + external on HDMI-A-1, extending right.
#
# Modes are intentionally left to the compositor (EDID-preferred for real
# HDMI monitors; panicos-output-init.sh handles the EDID-less case).

profile internal {
    output DSI-1 position 0,0
}

profile docked {
    output DSI-1 position 0,0
    output HDMI-A-1 position 640,0
}
