# PanicOS default kanshi profiles. kanshi listens for output hotplug and
# applies the first matching profile.
#
# "internal-only": just the built-in 640x480 panel (DSI-1).
# "docked":        internal panel + external on HDMI-A-1, extending right.
#
# kanshi matches on the connector list, so adding/removing HDMI flips
# between the two profiles automatically.

profile internal-only {
    output DSI-1 enable mode 640x480
}

profile docked {
    output DSI-1 enable mode 640x480 position 0,0
    output HDMI-A-1 enable position 640,0
}
