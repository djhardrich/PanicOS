# Sway drop-in shipped by PanicOS — installed to /etc/sway/config.d/.
#
# Sway's default user config (in ~/.config/sway/config or
# /etc/sway/config) ends with `include /etc/sway/config.d/*` so this
# file is picked up automatically without modifying user dotfiles.
#
# Mirrors the wayfire.ini [autostart] entries so the session-agent,
# kanshi, and the EDID-less output sanity script all run regardless
# of which wlroots compositor is in use.

exec /usr/local/lib/panicos/panicos-session-agent.py
exec kanshi
exec /usr/local/lib/panicos/panicos-output-init.sh
